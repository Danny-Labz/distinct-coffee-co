<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Order — Distinct. Coffee Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f6f2;
      --off-white: #eeebe5;
      --mid: #c8c3bb;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(248, 246, 242, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(10,10,10,0.08);
    }
    .nav-back {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .nav-back:hover { opacity: 1; }
    .nav-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* MAIN */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 120px 32px 80px;
    }

    /* EVENT BANNER */
    .event-banner {
      background: var(--black);
      color: var(--white);
      padding: 28px 36px;
      border-radius: 2px;
      margin-bottom: 48px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .event-banner-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.4;
    }
    .event-banner-name {
      font-size: 22px;
      font-weight: 200;
      letter-spacing: 0.5px;
    }
    .event-banner-meta {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      opacity: 0.5;
      margin-top: 4px;
      display: flex;
      gap: 20px;
    }

    /* SECTION LABELS */
    .section-label {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--off-white);
    }

    /* MENU ITEMS */
    .menu-section { margin-bottom: 40px; }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--off-white);
      gap: 16px;
    }
    .menu-item:last-child { border-bottom: none; }

    .item-info { flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    .item-desc {
      font-size: 10px;
      font-weight: 400;
      color: var(--mid);
      letter-spacing: 0.5px;
    }
    .item-price {
      font-size: 11px;
      font-weight: 500;
      color: var(--black);
      letter-spacing: 0.5px;
      min-width: 48px;
      text-align: right;
    }

    /* QUANTITY CONTROL */
    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid rgba(10,10,10,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 300;
      cursor: pointer;
      color: var(--black);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn:hover { background: var(--off-white); }
    .qty-display {
      width: 36px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      border-left: 1px solid rgba(10,10,10,0.1);
      border-right: 1px solid rgba(10,10,10,0.1);
      line-height: 32px;
    }

    /* CUSTOMIZATIONS */
    .customization-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .custom-chip {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 14px;
      border: 1px solid rgba(10,10,10,0.15);
      border-radius: 2px;
      cursor: pointer;
      background: none;
      color: var(--black);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .custom-chip.selected {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }
    .custom-chip:hover:not(.selected) { background: var(--off-white); }

    /* CUSTOMER INFO */
    .info-section { margin-bottom: 40px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 8px;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--off-white);
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 13px 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--black); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ORDER SUMMARY */
    .order-summary {
      background: var(--off-white);
      padding: 24px 28px;
      border-radius: 2px;
      margin-bottom: 24px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      font-weight: 400;
      padding: 6px 0;
      color: #555;
    }
    .summary-row.total {
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      border-top: 1px solid rgba(10,10,10,0.1);
      margin-top: 8px;
      padding-top: 14px;
    }
    .summary-empty {
      font-size: 11px;
      color: var(--mid);
      text-align: center;
      padding: 8px 0;
      letter-spacing: 0.5px;
    }

    /* CHECKOUT BTN */
    .btn-checkout {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.25s;
    }
    .btn-checkout:hover:not(:disabled) { background: #222; }
    .btn-checkout:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .secure-note {
      text-align: center;
      font-size: 9px;
      color: var(--mid);
      letter-spacing: 1px;
      margin-top: 12px;
    }

    /* ERROR */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 11px;
      margin-bottom: 16px;
    }

    /* PAYMENT OPTIONS */
    .payment-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .payment-opt {
      background: var(--off-white);
      border: 2px solid transparent;
      border-radius: 2px;
      padding: 18px 16px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-family: 'Montserrat', sans-serif;
    }
    .payment-opt:hover { border-color: rgba(10,10,10,0.2); }
    .payment-opt.selected {
      border-color: var(--black);
      background: var(--white);
    }
    .payment-opt-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--black);
      margin-bottom: 6px;
    }
    .payment-opt-desc {
      font-size: 10px;
      font-weight: 300;
      line-height: 1.6;
      color: #888;
    }
    .payment-opt.selected .payment-opt-title { color: var(--black); }
    .payment-opt.selected .payment-opt-desc  { color: #555; }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      main { padding: 100px 20px 60px; }
      .form-row { grid-template-columns: 1fr; }
      .payment-options { grid-template-columns: 1fr; }
      .event-banner { padding: 22px 24px; }
      .event-banner-meta { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-back">← Back</a>
    <span class="nav-title">Pre-Order</span>
  </nav>

  <main>

    <!-- EVENT BANNER -->
    <div class="event-banner" id="event-banner">
      <div class="event-banner-label">Upcoming Event</div>
      <div class="event-banner-name" id="event-name">Loading...</div>
      <div class="event-banner-meta">
        <span id="event-date">—</span>
        <span id="event-location">—</span>
        <span id="event-pickup">—</span>
      </div>
      <div id="event-cutoff" style="margin-top:8px;font-size:9px;letter-spacing:1px;opacity:0.45;"></div>
    </div>

    <!-- STATUS MESSAGE (shown when no event or orders closed) -->
    <div id="event-status" style="display:none;background:var(--off-white);padding:24px 28px;border-radius:2px;margin-bottom:32px;font-size:12px;line-height:1.8;color:#666;letter-spacing:0.3px;"></div>

    <div id="order-form" style="display:none;">

    <!-- MENU — loaded dynamically from Supabase menu_items table -->
    <div id="menu-sections">
      <div style="padding:40px 0;text-align:center;color:#c8c3bb;font-size:11px;letter-spacing:1px;">Loading menu...</div>
    </div>

        <!-- CUSTOMIZATIONS -->
    <div class="menu-section">
      <div class="section-label">Milk Preference</div>
      <div class="customization-row" id="milk-options">
        <button class="custom-chip selected" data-group="milk" onclick="selectChip(this)">Dairy</button>
        <button class="custom-chip" data-group="milk" onclick="selectChip(this)">Oat</button>
        <button class="custom-chip" data-group="milk" onclick="selectChip(this)">Almond</button>
        <button class="custom-chip" data-group="milk" onclick="selectChip(this)">No Milk</button>
      </div>

      <div class="section-label" style="margin-top:24px;">Temperature</div>
      <div class="customization-row" id="temp-options">
        <button class="custom-chip selected" data-group="temp" onclick="selectChip(this)">Hot</button>
        <button class="custom-chip" data-group="temp" onclick="selectChip(this)">Iced</button>
      </div>

      <div class="section-label" style="margin-top:24px;">Add-ons</div>
      <div class="customization-row" id="addon-options">
        <button class="custom-chip" data-group="addon" data-multi onclick="toggleAddon(this)">Extra Shot +$1</button>
        <button class="custom-chip" data-group="addon" data-multi onclick="toggleAddon(this)">Vanilla Syrup +$0.75</button>
        <button class="custom-chip" data-group="addon" data-multi onclick="toggleAddon(this)">Caramel Syrup +$0.75</button>
        <button class="custom-chip" data-group="addon" data-multi onclick="toggleAddon(this)">Hazelnut Syrup +$0.75</button>
      </div>
    </div>

    <!-- PICKUP TIME -->
    <div class="info-section">
      <div class="section-label">Pickup Time</div>
      <div class="form-group">
        <label class="form-label">Select your pickup window</label>
        <select class="form-select" id="pickup-time">
          <option value="">Choose a time...</option>
          <option>9:00 AM – 9:15 AM</option>
          <option>9:15 AM – 9:30 AM</option>
          <option>9:30 AM – 9:45 AM</option>
          <option>9:45 AM – 10:00 AM</option>
          <option>10:00 AM – 10:15 AM</option>
          <option>10:15 AM – 10:30 AM</option>
          <option>10:30 AM – 10:45 AM</option>
          <option>10:45 AM – 11:00 AM</option>
          <option>11:00 AM – 11:15 AM</option>
          <option>11:15 AM – 11:30 AM</option>
        </select>
      </div>
    </div>

    <!-- CUSTOMER INFO -->
    <div class="info-section">
      <div class="section-label">Your Details</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" id="first-name" placeholder="Danny" />
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" id="last-name" placeholder="Smith" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-input" id="phone" placeholder="(555) 000-0000" />
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input type="text" class="form-input" id="notes" placeholder="Any special requests..." />
      </div>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="section-label">Order Summary</div>
    <div class="order-summary">
      <div id="summary-items">
        <div class="summary-empty">No items selected yet</div>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="summary-total">$0.00</span>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <!-- PAYMENT METHOD CHOICE -->
    <div class="section-label">Payment</div>
    <div class="payment-options">
      <button class="payment-opt selected" id="pay-now-btn" data-method="pay_now" onclick="selectPayment(this)">
        <div class="payment-opt-title">Pay Now</div>
        <div class="payment-opt-desc">Secure card payment via Stripe. Order confirmed instantly.</div>
      </button>
      <button class="payment-opt" id="pay-later-btn" data-method="pay_at_event" onclick="selectPayment(this)">
        <div class="payment-opt-title">Pay at Event</div>
        <div class="payment-opt-desc">Cash or card accepted on the day. Order reserved, not yet paid.</div>
      </button>
    </div>

    <button class="btn-checkout" id="checkout-btn" onclick="handleCheckout()" disabled>
      Proceed to Payment →
    </button>
    <p class="secure-note" id="secure-note">🔒 Secure checkout powered by Stripe</p>

  </main>

  </div><!-- end #order-form -->
  <script src="js/order.js"></script>
</body>
</html>
